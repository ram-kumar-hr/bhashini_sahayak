version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bhashini_qdrant
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_storage:
